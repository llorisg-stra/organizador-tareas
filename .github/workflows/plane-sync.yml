name: Sync PR to Plane

on:
  pull_request:
    types: [opened, closed, reopened]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Notify n8n
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_ACTION: ${{ github.event.action }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_USER: ${{ github.event.pull_request.user.login }}
          REPO_NAME: ${{ github.repository }}
        run: |
          JSON=$(jq -n \
            --arg action "$PR_ACTION" \
            --arg title "$PR_TITLE" \
            --argjson number "$PR_NUMBER" \
            --argjson merged "${PR_MERGED:-false}" \
            --arg url "$PR_URL" \
            --arg user "$PR_USER" \
            --arg repo "$REPO_NAME" \
            '{action: $action, pull_request: {number: $number, title: $title, merged: $merged, html_url: $url, user: {login: $user}}, repository: {full_name: $repo}}')
          echo "Sending: $JSON"
          curl -sf -X POST https://tareasn8n.slabs.studio/webhook/github-pr \
            -H "Content-Type: application/json" \
            -d "$JSON" || echo "Done"
